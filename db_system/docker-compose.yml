services:
  # Object Storage per le immagini
  minio:
    image: minio/minio
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console GUI
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"

  # Vector Database per gli embedding e calcolo drift
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333" # API
      - "6334:6334" # gRPC
    volumes:
      - ./qdrant_data:/qdrant/storage

  # Database per i verdetti e metadati
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: drift_db
    ports:
      - "5432:5432"
