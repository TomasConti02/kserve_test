apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: my-model-with-drift
  namespace: drift-system
spec:
  transformer:
    containers:
    - name: drift-transformer
      image: myregistry/drift-transformer:latest
      env:
      - name: MINIO_ENDPOINT
        value: minio.drift-system.svc.cluster.local:9000
      - name: MINIO_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: minio-credentials
            key: AWS_ACCESS_KEY_ID
      - name: MINIO_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: minio-credentials
            key: AWS_SECRET_ACCESS_KEY
      - name: QDRANT_HOST
        value: qdrant.drift-system.svc.cluster.local
      - name: POSTGRES_HOST
        value: postgres.drift-system.svc.cluster.local
      # ... altre variabili
  predictor:
    model:
      modelFormat:
        name: tensorflow
      storageUri: s3://my-models/model-123
      storageSecret: minio-credentials   # se il modello è su MinIO
