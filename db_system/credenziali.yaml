apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: drift-system   # o il namespace dove giri KServe
annotations:
  serving.kserve.io/s3-endpoint: minio.drift-system.svc.cluster.local:9000  # endpoint interno
  serving.kserve.io/s3-usehttps: "0"
  serving.kserve.io/s3-region: us-east-1
  serving.kserve.io/s3-verifyssl: "0"
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: admin
  AWS_SECRET_ACCESS_KEY: password123

---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: my-model
  namespace: drift-system
spec:
  predictor:
    model:
      modelFormat:
        name: tensorflow
      storageUri: s3://my-bucket/model-path
      storageSecret: minio-credentials
