apiVersion: "serving.kserve.io/v1alpha1"
kind: "InferenceGraph"
metadata:
  name: "mnist-monitoring-graph"
spec:
  nodes:
    root:
      routerType: "Ensemble" # Invia la richiesta a tutti i nodi elencati
      steps:
        - serviceName: "simple-cnn"
          name: "predictor"
        - serviceName: "drift-detector"
          name: "drift"
